<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<!-- Preconnect to external domains -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="//cdn.clustrmaps.com">

<!-- Academicons (local, 2.7KB) — only ai-google-scholar and ai-researchgate used -->
<link rel="stylesheet" href="{{ "/assets/css/academicons.min.css" | relative_url }}">

<link rel="alternate" href="{{ site.url }}/feed.xml" type="application/rss+xml" title="{{ site.title }}">
<link rel="icon" type="image/png" href="/assets/img/icon.png">
<link rel="apple-touch-icon" type="image/png" href="/assets/img/apple-touch-icon.png">

<link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">

{% if page.keywords %}
<meta name="keywords" content="{{ page.keywords }}">
{% elsif site.keywords %}
<meta name="keywords" content="{{ site.keywords }}">
{% endif %}

{% seo %}

<!-- Open Graph -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.plainwhite.name }} | {{ site.plainwhite.name }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ site.url }}/assets/img/portfolio.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@{{ site.twitter.username }}">
<meta name="twitter:title" content="{{ page.title | default: site.plainwhite.name }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
<meta name="twitter:image" content="{{ site.url }}/assets/img/portfolio.png">

<!-- Schema.org structured data -->
{% include schema.html %}
